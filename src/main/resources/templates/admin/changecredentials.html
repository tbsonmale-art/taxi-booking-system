<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Change Credentials</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-teal-100 via-yellow-50 to-blue-100 min-h-screen flex items-center justify-center">

  <form action="changeCredentials" method="post" 
        class="bg-white shadow-xl rounded-2xl p-8 w-full max-w-md space-y-5 animate-[fadeIn_0.6s_ease-in-out]">

    <h2 class="text-2xl font-bold text-center text-gray-800 mb-4">Change Credentials</h2>

    <input type="text" name="oldusername" placeholder="Enter Old Username"
           class="w-full px-4 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-teal-400">

    <input type="password" name="oldupassword" placeholder="Enter Old Password"
           class="w-full px-4 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-teal-400">

    <input type="text" name="newusername" placeholder="Enter New Username"
           class="w-full px-4 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-teal-400">

    <input type="password" name="newpassword" placeholder="Enter New Password"
           class="w-full px-4 py-2 border rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-teal-400">

    <button type="submit" 
            class="w-full bg-teal-500 hover:bg-teal-600 text-white font-semibold py-2 px-4 rounded-xl transition-all duration-200">
      Change
    </button>

  </form>

</body>
</html>
