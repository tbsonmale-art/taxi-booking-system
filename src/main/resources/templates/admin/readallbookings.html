<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Booking Data</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-teal-100 via-yellow-50 to-blue-100 min-h-screen font-sans p-8">

  <!-- Header -->
  <div class="flex items-center justify-between mb-8">
    <h1 class="text-3xl font-extrabold text-teal-700 drop-shadow-md">
      🌍 Booking Data
    </h1>
    <a href="dashboard" 
       class="bg-gradient-to-r from-teal-500 to-blue-500 text-white font-semibold px-5 py-2 rounded-lg shadow-md hover:scale-105 hover:opacity-90 transition duration-300">
      ⬅ Back to Dashboard
    </a>
  </div>
<p th:text="${msg}" 
   class="mt-4 mb-6 text-center font-semibold text-green-700 bg-green-100 border border-green-300 rounded-xl py-2 px-4 shadow-md">
</p>

  <!-- Table -->
  <div class="overflow-x-auto bg-white rounded-2xl shadow-xl border border-gray-200">
    <table class="min-w-full">
      <thead class="bg-gradient-to-r from-teal-400 to-blue-400 text-white text-sm uppercase tracking-wider">
        <tr>
          <th class="py-3 px-4">ID</th>
          <th class="py-3 px-4">Name</th>
          <th class="py-3 px-4">From</th>
          <th class="py-3 px-4">Email</th>
          <th class="py-3 px-4">To</th>
          <th class="py-3 px-4">Time</th>
          <th class="py-3 px-4">Date</th>
          <th class="py-3 px-4">Comfort</th>
          <th class="py-3 px-4">Adult</th>
          <th class="py-3 px-4">Children</th>
          <th class="py-3 px-4">Message</th>
          <th class="py-3 px-4 text-center">Action</th>
        </tr>
      </thead>

      <tbody>
        <tr th:each="booking : ${allbookings}" 
            class="odd:bg-yellow-50 even:bg-white hover:bg-blue-50 transition duration-200">
          <td th:text="${booking.id}" class="py-3 px-4 border-b"></td>
          <td th:text="${booking.name}" class="py-3 px-4 border-b"></td>
          <td th:text="${booking.from}" class="py-3 px-4 border-b"></td>
          <td th:text="${booking.email}" class="py-3 px-4 border-b"></td>
          <td th:text="${booking.to}" class="py-3 px-4 border-b"></td>
          <td th:text="${booking.time}" class="py-3 px-4 border-b"></td>
          <td th:text="${booking.date}" class="py-3 px-4 border-b"></td>
          <td th:text="${booking.comfort}" class="py-3 px-4 border-b"></td>
          <td th:text="${booking.adult}" class="py-3 px-4 border-b"></td>
          <td th:text="${booking.children}" class="py-3 px-4 border-b"></td>
          <td th:text="${booking.message}" class="py-3 px-4 border-b"></td>
          <td class="py-3 px-4 border-b text-center">
            <a th:href="@{/admin/deleteBooking/{id}(id=${booking.id})}"
             class="bg-gradient-to-r from-red-500 to-pink-500 text-white px-4 py-1 rounded-lg shadow hover:scale-105 hover:opacity-90 transition duration-200">
              🗑 Delete
           </a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</body>
</html>
