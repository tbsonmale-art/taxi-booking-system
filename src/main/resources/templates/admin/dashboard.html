<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeInScale {
      from { opacity: 0; transform: scale(0.9) translateY(20px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    .fade-in {
      animation: fadeInScale 1s ease-out forwards;
    }
    @keyframes glow {
      0%, 100% { text-shadow: 0 0 5px #f87171, 0 0 10px #ef4444; }
      50% { text-shadow: 0 0 15px #dc2626, 0 0 30px #f87171; }
    }
    .glow-text {
      animation: glow 2s infinite alternate;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center font-sans bg-black text-white">

  <!-- Card -->
  <div class="bg-gray-900 shadow-2xl rounded-3xl p-10 w-full max-w-md text-center fade-in">
    
    <h1 class="text-3xl font-extrabold text-red-500 mb-8 tracking-wide glow-text">
      ✨ Admin Dashboard ✨
    </h1>

<!-- Messages Section -->
<div class="space-y-3 mb-6">
  
  <!-- Success Message -->
  <p th:if="${msg}" 
     class="flex items-center justify-center gap-2 text-green-300 font-semibold 
            bg-green-900/30 border border-green-500/40 rounded-xl px-4 py-2 shadow-md">
    ✅ <span th:text="${msg}"></span>
  </p>

  <!-- Warning / Error Message -->
  <p th:if="${wmsg}" 
     class="flex items-center justify-center gap-2 text-red-300 font-semibold 
            bg-red-900/30 border border-red-500/40 rounded-xl px-4 py-2 shadow-md">
    ⚠️ <span th:text="${wmsg}"></span>
  </p>

</div>


    <!-- Action Links -->
    <div class="space-y-4">
      <a href="readAllContact" 
         class="block bg-gray-700 text-white font-medium py-3 rounded-xl shadow-md hover:bg-gray-600 transition duration-300 transform hover:scale-105">
        📇 Read All Contacts
      </a>

      <a href="readAllBooking" 
         class="block bg-gray-700 text-white font-medium py-3 rounded-xl shadow-md hover:bg-gray-600 transition duration-300 transform hover:scale-105">
        📘 Read All Bookings
      </a>
      
      <a href="addServices" 
         class="block bg-gray-700 text-white font-medium py-3 rounded-xl shadow-md hover:bg-gray-600 transition duration-300 transform hover:scale-105">
       🛠️ Add Services
      </a>

      <a href="changeCredentials" 
         class="block bg-gray-700 text-white font-medium py-3 rounded-xl shadow-md hover:bg-gray-600 transition duration-300 transform hover:scale-105">
        🔑 Change Credentials
      </a>
    </div>

    <!-- Logout Button -->
    <div class="mt-10">
      <a href="/dologout" 
         class="inline-block bg-red-600 text-white font-semibold px-8 py-3 rounded-full shadow-lg hover:bg-red-700 transition duration-300 transform hover:scale-110">
        🚪 LOGOUT
      </a>
    </div>

  </div>

</body>
</html>
